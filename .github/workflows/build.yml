name: Build Project

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js (LTS)
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install Bun (package manager)
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Create .env file from example
      run: |
        if [ -f .env.example ]; then
          cp .env.example .env
        else
          echo "No .env.example found, creating empty .env"
          touch .env
        fi

    - name: Install Dependencies with Bun
      run: bun install

    - name: Build Project with Bun
      run: bun run build

    - name: Upload dist folder
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist
